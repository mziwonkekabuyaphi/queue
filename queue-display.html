<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Rands Butcher | Customer Queue Display</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #03050a;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* MAIN TV DISPLAY — MAXIMUM CONTRAST, BOLD */
    .tv-display {
      max-width: 1800px;
      width: 100%;
      margin: 0 auto;
      background: #070a12;
      border-radius: 48px;
      overflow: hidden;
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.9), 0 0 0 2px rgba(220, 38, 38, 0.3);
    }

    /* BRANDING HEADER — HIGH VISIBILITY */
    .brand-header {
      background: #000000dd;
      backdrop-filter: blur(8px);
      padding: 24px 40px;
      border-bottom: 3px solid #ef4444;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }
    .brand-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .brand-logo {
      height: 64px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(239,68,68,0.5));
    }
    .logo-fallback {
      width: 64px;
      height: 64px;
      background: #dc2626;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 800;
      color: white;
    }
    .brand-name {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #ef4444);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .brand-tag {
      color: #facc15;
      font-size: 1.2rem;
      font-weight: 700;
      background: #1e293b;
      padding: 10px 24px;
      border-radius: 60px;
      letter-spacing: 1px;
    }
    .live-indicator {
      display: inline-block;
      width: 16px;
      height: 16px;
      background: #10b981;
      border-radius: 50%;
      margin-left: 12px;
      animation: blink 1s infinite;
      box-shadow: 0 0 8px #10b981;
    }
    @keyframes blink { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }

    /* 2-COLUMN SPLIT SCREEN — EXTREME CLEAR SEPARATION */
    .split-screen {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 75vh;
    }

    /* LEFT PANEL: NOW SERVING + QUEUE (RED/ORANGE THEME) */
    .queue-panel {
      background: linear-gradient(145deg, #0a0e1a, #060810);
      border-right: 4px solid #ef4444;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
    }
    .panel-title {
      font-size: 2.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #ef4444;
      margin-bottom: 40px;
      border-left: 8px solid #ef4444;
      padding-left: 28px;
      text-shadow: 0 0 6px rgba(239,68,68,0.5);
    }
    .now-serving-card {
      background: #00000080;
      backdrop-filter: blur(4px);
      border-radius: 64px;
      padding: 56px 24px;
      text-align: center;
      margin-bottom: 56px;
      border: 2px solid #ef4444;
      box-shadow: 0 25px 40px -15px rgba(239,68,68,0.3);
    }
    .serving-label {
      font-size: 1.8rem;
      font-weight: 600;
      color: #facc15;
      letter-spacing: 3px;
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    .current-ticket {
      font-size: 12rem;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 30px #ef4444, 0 0 15px #dc2626;
      letter-spacing: 8px;
      line-height: 1.1;
      word-break: break-word;
      background: #00000030;
      display: inline-block;
      padding: 0 20px;
      border-radius: 40px;
    }
    .next-queue-section {
      margin-top: 24px;
      background: #0f1220aa;
      border-radius: 48px;
      padding: 28px 24px;
    }
    .next-label {
      font-size: 1.8rem;
      font-weight: 700;
      color: #facc15;
      margin-bottom: 28px;
      text-align: center;
      letter-spacing: 2px;
    }
    .next-tickets {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }
    .next-ticket {
      background: #1a1f30;
      border-radius: 80px;
      padding: 20px 40px;
      font-size: 2.8rem;
      font-weight: 800;
      color: #facc15;
      border: 2px solid #f97316;
      min-width: 160px;
      text-align: center;
      letter-spacing: 2px;
    }
    .wait-time-info {
      margin-top: 36px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 600;
      color: #cbd5e1;
      background: #00000060;
      padding: 18px 24px;
      border-radius: 80px;
      backdrop-filter: blur(4px);
    }

    /* RIGHT PANEL: READY ORDERS (GREEN THEME) — EXTREMELY VISIBLE */
    .ready-panel {
      background: linear-gradient(145deg, #0a0e18, #050810);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
    }
    .ready-title {
      font-size: 2.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #10b981;
      margin-bottom: 40px;
      border-left: 8px solid #10b981;
      padding-left: 28px;
      text-shadow: 0 0 6px rgba(16,185,129,0.5);
    }
    .ready-orders-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      align-items: flex-start;
      align-content: flex-start;
    }
    .ready-card {
      background: #0a1412;
      border-radius: 56px;
      padding: 40px 36px;
      min-width: 220px;
      text-align: center;
      transition: all 0.2s;
      border: 3px solid #2e7d64;
      box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.5);
    }
    /* EXTREME GLOW FOR NEWLY READY ORDERS */
    .ready-card.new-highlight {
      background: linear-gradient(145deg, #14532d, #0a3b2a);
      border: 3px solid #4ade80;
      box-shadow: 0 0 40px #10b981, 0 0 15px #4ade80;
      animation: pulseReadyStrong 0.5s ease-in-out 3;
    }
    @keyframes pulseReadyStrong {
      0% { transform: scale(1); box-shadow: 0 0 0 0 #10b981; }
      50% { transform: scale(1.05); box-shadow: 0 0 0 18px rgba(16,185,129,0.4); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 #10b981; }
    }
    .ready-ticket-number {
      font-size: 4rem;
      font-weight: 900;
      color: #facc15;
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
    .ready-badge {
      font-size: 1.2rem;
      background: #10b98130;
      color: #4ade80;
      border-radius: 60px;
      padding: 8px 20px;
      display: inline-block;
      font-weight: 700;
      text-transform: uppercase;
    }
    .empty-ready {
      color: #6b7280;
      font-size: 2rem;
      font-weight: 600;
      text-align: center;
      padding: 60px 20px;
      width: 100%;
      background: #0f1220;
      border-radius: 48px;
    }

    /* LARGE SCREEN TV (1600px+) — EVEN BIGGER FONTS */
    @media (min-width: 1600px) {
      .current-ticket { font-size: 15rem; }
      .next-ticket { font-size: 3.2rem; padding: 24px 48px; min-width: 200px; }
      .ready-ticket-number { font-size: 5rem; }
      .ready-card { padding: 48px 44px; min-width: 280px; }
      .panel-title, .ready-title { font-size: 3.2rem; }
      .serving-label { font-size: 2rem; }
      .next-label { font-size: 2rem; }
      .wait-time-info { font-size: 1.6rem; }
      .brand-name { font-size: 2.8rem; }
      .brand-logo { height: 80px; }
    }

    /* TABLET / SMALL TV LANDSCAPE */
    @media (max-width: 1100px) {
      .split-screen { grid-template-columns: 1fr; gap: 0; }
      .queue-panel { border-right: none; border-bottom: 4px solid #ef4444; }
      .current-ticket { font-size: 8rem; }
      .next-ticket { font-size: 2rem; padding: 14px 28px; min-width: 140px; }
      .ready-ticket-number { font-size: 3rem; }
      .ready-card { padding: 28px 24px; min-width: 180px; }
    }

    @media (max-width: 640px) {
      body { padding: 8px; }
      .tv-display { border-radius: 28px; }
      .queue-panel, .ready-panel { padding: 28px 20px; }
      .current-ticket { font-size: 5rem; letter-spacing: 4px; }
      .next-ticket { font-size: 1.4rem; padding: 10px 20px; min-width: 110px; }
      .ready-ticket-number { font-size: 2rem; }
      .panel-title, .ready-title { font-size: 1.8rem; }
      .serving-label { font-size: 1.2rem; }
      .brand-name { font-size: 1.4rem; }
      .brand-logo { height: 44px; }
    }
  </style>
</head>
<body>
<div class="tv-display">
  <!-- Branding Header with Logo (high visibility) -->
  <div class="brand-header">
    <div class="brand-left">
      <img class="brand-logo" src="images/rands-logo.png" alt="Rands Logo" id="tvLogo" onerror="handleTVLogoError()">
      <div id="logoFallback" style="display: none;"><div class="logo-fallback">R</div></div>
      <div class="brand-name">RANDS BUTCHER</div>
    </div>
    <div class="brand-tag">LIVE QUEUE <span class="live-indicator"></span></div>
  </div>

  <div class="split-screen">
    <!-- LEFT SIDE: NOW SERVING + QUEUE (Maximum visibility) -->
    <div class="queue-panel">
      <div class="panel-title"><i class="fas fa-phone-alt"></i> NOW SERVING</div>
      <div class="now-serving-card">
        <div class="serving-label">⚡ CURRENT TICKET ⚡</div>
        <div class="current-ticket" id="currentServingTicket">—</div>
      </div>
      <div class="next-queue-section">
        <div class="next-label">📢 NEXT IN LINE</div>
        <div class="next-tickets" id="nextTicketsList">
          <div class="next-ticket">—</div>
        </div>
      </div>
      <div class="wait-time-info" id="waitTimeEstimate">
        <i class="far fa-clock"></i> ESTIMATED WAIT: — MIN
      </div>
    </div>

    <!-- RIGHT SIDE: READY ORDERS (Bold green section) -->
    <div class="ready-panel">
      <div class="ready-title"><i class="fas fa-check-circle"></i> READY FOR COLLECTION</div>
      <div class="ready-orders-grid" id="readyOrdersGrid">
        <div class="empty-ready">✨ NO ORDERS READY</div>
      </div>
    </div>
  </div>
</div>

<script>
  // Logo fallback handler
  function handleTVLogoError() {
    const img = document.getElementById('tvLogo');
    const fallback = document.getElementById('logoFallback');
    if (img && fallback) {
      img.style.display = 'none';
      fallback.style.display = 'flex';
      fallback.style.justifyContent = 'center';
      fallback.style.alignItems = 'center';
    }
  }

  // ---------- INTEGRATION WITH STAFF DASHBOARD & KITCHEN ----------
  const QUEUE_KEY = 'butcher_shop_queue';        // queue array
  const ORDERS_KEY = 'butcher_shop_orders';      // orders with kitchenStatus
  
  function getQueue() {
    return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
  }
  
  function getOrders() {
    return JSON.parse(localStorage.getItem(ORDERS_KEY) || '[]');
  }
  
  let highlightedReadySet = new Set();   // track orders that already had highlight glow
  
  // RENDER LEFT PANEL: Now Serving + Next Tickets (ultra clear)
  function renderQueueDisplay() {
    const queue = getQueue();
    // Find first ticket that has been "called" (staff called next)
    const calledIndex = queue.findIndex(t => t.called === true);
    let currentTicket = null;
    let upcomingTickets = [];
    
    if (calledIndex !== -1) {
      currentTicket = queue[calledIndex];
      upcomingTickets = queue.filter((_, idx) => idx !== calledIndex);
    } else if (queue.length > 0) {
      // fallback: show first ticket as current
      currentTicket = queue[0];
      upcomingTickets = queue.slice(1);
    }
    
    const servingEl = document.getElementById('currentServingTicket');
    servingEl.innerText = currentTicket ? currentTicket.ticketNumber : '—';
    if (currentTicket) {
      servingEl.style.textShadow = '0 0 30px #ef4444, 0 0 15px #dc2626';
    } else {
      servingEl.style.textShadow = 'none';
    }
    
    // Show next tickets (up to 6 for clarity)
    const nextList = upcomingTickets.slice(0, 6);
    const nextContainer = document.getElementById('nextTicketsList');
    if (nextList.length === 0) {
      nextContainer.innerHTML = '<div class="next-ticket">—</div>';
    } else {
      nextContainer.innerHTML = nextList.map(t => `<div class="next-ticket">${t.ticketNumber}</div>`).join('');
    }
    
    // Estimate wait time (approx 3-5 min per order)
    const avgMinutesPerOrder = 4;
    const waitMinutes = upcomingTickets.length * avgMinutesPerOrder;
    const waitText = waitMinutes === 0 ? 'NOW SERVING' : (waitMinutes < 2 ? '~1-2 MIN' : `~${waitMinutes} MIN`);
    document.getElementById('waitTimeEstimate').innerHTML = `<i class="far fa-clock"></i> ESTIMATED WAIT: ${waitText}  |  ${upcomingTickets.length} AHEAD`;
  }
  
  // RENDER RIGHT PANEL: Ready orders with massive visibility + glow animation
  function renderReadyOrders() {
    const orders = getOrders();
    const readyOrders = orders.filter(order => order.kitchenStatus === 'ready');
    // sort by when they became ready (oldest first for FIFO display)
    readyOrders.sort((a, b) => new Date(a.updatedAt) - new Date(b.updatedAt));
    
    const container = document.getElementById('readyOrdersGrid');
    if (readyOrders.length === 0) {
      container.innerHTML = '<div class="empty-ready">✨ NO ORDERS READY</div>';
      return;
    }
    
    const now = Date.now();
    const HIGHLIGHT_DURATION = 12000; // 12 seconds of strong glow
    
    const readyHtml = readyOrders.map(order => {
      const isNew = !highlightedReadySet.has(order.ticketNumber);
      let shouldHighlight = false;
      if (isNew && order.updatedAt) {
        const readyTime = new Date(order.updatedAt).getTime();
        if (now - readyTime < HIGHLIGHT_DURATION) {
          shouldHighlight = true;
          highlightedReadySet.add(order.ticketNumber);
          // Auto-remove highlight effect after duration
          setTimeout(() => {
            if (highlightedReadySet.has(order.ticketNumber)) {
              highlightedReadySet.delete(order.ticketNumber);
              renderReadyOrders();
            }
          }, HIGHLIGHT_DURATION);
        } else {
          highlightedReadySet.add(order.ticketNumber);
        }
      }
      const glowClass = shouldHighlight ? 'new-highlight' : '';
      return `
        <div class="ready-card ${glowClass}" data-ticket="${order.ticketNumber}">
          <div class="ready-ticket-number">${order.ticketNumber}</div>
          <div class="ready-badge"><i class="fas fa-bell"></i> READY</div>
        </div>
      `;
    }).join('');
    
    container.innerHTML = readyHtml;
  }
  
  // Optional: gentle alert sound for new ready orders (non-intrusive)
  let lastReadyCount = 0;
  function playReadyAlertIfNew() {
    const orders = getOrders();
    const readyCount = orders.filter(o => o.kitchenStatus === 'ready').length;
    if (readyCount > lastReadyCount && readyCount > 0) {
      try {
        // Simple beep using Web Audio — works on TV displays (user interaction not required for simple sound)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.25;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
        osc.stop(audioCtx.currentTime + 0.7);
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch(e) { /* silent */ }
    }
    lastReadyCount = readyCount;
  }
  
  // MASTER REFRESH (TV updates instantly)
  function refreshDisplay() {
    renderQueueDisplay();
    renderReadyOrders();
    playReadyAlertIfNew();
  }
  
  // Storage listener (cross-tab sync from staff dashboard / kitchen)
  window.addEventListener('storage', (event) => {
    if (event.key === QUEUE_KEY || event.key === ORDERS_KEY) {
      refreshDisplay();
    }
  });
  
  // Monkey patch localStorage.setItem to catch local updates (same tab)
  const originalSetItem = localStorage.setItem;
  localStorage.setItem = function(key, value) {
    originalSetItem.apply(this, arguments);
    if (key === QUEUE_KEY || key === ORDERS_KEY) {
      refreshDisplay();
    }
  };
  
  // Poll every 1.5 seconds to ensure real-time (for TV reliability)
  let pollInterval;
  function startPolling() {
    if (pollInterval) clearInterval(pollInterval);
    pollInterval = setInterval(() => {
      refreshDisplay();
    }, 1500);
  }
  
  // Seed demo data only if completely empty (first run)
  function seedDemoDataIfEmpty() {
    const queue = getQueue();
    const orders = getOrders();
    const hasActiveQueue = queue && queue.length > 0;
    const hasReadyOrders = orders && orders.some(o => o.kitchenStatus === 'ready');
    
    if (!hasActiveQueue && !hasReadyOrders) {
      // Demo queue for showcasing on fresh install
      const demoQueue = [
        { ticketNumber: "B-124", timestamp: new Date(Date.now() - 6*60000).toISOString(), called: true, customerName: "Demo" },
        { ticketNumber: "B-125", timestamp: new Date(Date.now() - 4*60000).toISOString(), called: false },
        { ticketNumber: "B-126", timestamp: new Date(Date.now() - 2*60000).toISOString(), called: false },
        { ticketNumber: "B-127", timestamp: new Date(Date.now() - 1*60000).toISOString(), called: false }
      ];
      localStorage.setItem(QUEUE_KEY, JSON.stringify(demoQueue));
      
      const demoOrders = [
        { ticketNumber: "B-122", items: [], kitchenStatus: "ready", createdAt: new Date(Date.now() - 8*60000).toISOString(), updatedAt: new Date(Date.now() - 3*60000).toISOString(), paid: true },
        { ticketNumber: "B-123", items: [], kitchenStatus: "ready", createdAt: new Date(Date.now() - 5*60000).toISOString(), updatedAt: new Date(Date.now() - 2*60000).toISOString(), paid: true }
      ];
      localStorage.setItem(ORDERS_KEY, JSON.stringify(demoOrders));
      refreshDisplay();
    } else {
      refreshDisplay();
    }
  }
  
  // Initialize TV display with high visibility mode
  function initTV() {
    seedDemoDataIfEmpty();
    startPolling();
    // extra refresh on visibility change (when screen wakes)
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) refreshDisplay();
    });
    // also refresh every 10 seconds to keep wait time accurate
    setInterval(() => {
      renderQueueDisplay();
    }, 10000);
  }
  
  initTV();
</script>
<!-- Font Awesome for clean icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</body>
</html>
